{{- /* External link render hook - place in layouts/_default/_markup/render-link.html */ -}}
{{- $isExternal := or (hasPrefix .Destination "http://") (hasPrefix .Destination "https://") -}}
{{- $isNotSite := not (hasPrefix .Destination (printf "%s" site.BaseURL)) -}}
<a href="{{ .Destination | safeURL }}"
  {{- if and $isExternal $isNotSite }} target="_blank" rel="noopener noreferrer"{{ end -}}
  {{- with .Title }} title="{{ . }}"{{ end -}}
>{{ .Text | safeHTML }}</a>
