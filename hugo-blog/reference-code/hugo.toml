baseURL = 'https://yoursite.com/'
languageCode = 'en-us'
title = 'Your Name'
theme = 'PaperMod'

[pagination]
    pagerSize = 10

[params]
    env = "production"
    description = "Your tagline here"
    author = "Your Name"
    images = ["/img/og-default.png"]

    # Dark mode by default with toggle
    defaultTheme = "dark"
    disableThemeToggle = false

    # Show reading time on posts
    ShowReadingTime = true
    ShowBreadCrumbs = true
    ShowPostNavLinks = true
    ShowCodeCopyButtons = true

    # Include full post content in RSS feed (for newsletter)
    ShowFullTextinRSS = true

[params.footer]
    hideCopyright = true
    hideCredits = true

[params.homeInfoParams]
    Title = "Your Name"
    Content = "Your tagline here"

# Social icons
[[params.socialIcons]]
    name = "youtube"
    url = "https://youtube.com/@yourchannel"
[[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/yourprofile"
[[params.socialIcons]]
    name = "github"
    url = "https://github.com/yourusername"
[[params.socialIcons]]
    name = "email"
    url = "/newsletter/"
[[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

# Menu
[[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
[[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
[[menu.main]]
    identifier = "newsletter"
    name = "Newsletter"
    url = "/newsletter/"
    weight = 25
[[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30

# Enable search (requires JSON output)
[outputs]
    home = ["HTML", "RSS", "JSON"]

# Markdown rendering
[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
    [markup.highlight]
        codeFences = true
        lineNos = false
        style = "dracula"
