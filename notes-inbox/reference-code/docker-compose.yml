services:
  inbox:
    build: .
    container_name: inbox-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - CONFIG_DIR=/config
      - DATA_DIR=/data
      - CERTS_DIR=/certs
      - INBOX_API_PORT=4000
      - TZ=America/Los_Angeles
    volumes:
      - .:/app:ro
      - ./config:/config:ro
      - ./data:/data:rw
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('https://localhost:4000/health', {tls: {rejectUnauthorized: false}}).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
